<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Agent Manager</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-left">
                <span class="brand">⚽ Agent Manager</span>
                <span class="phase-badge" id="phaseBadge">—</span>
            </div>
            <div class="topbar-right">
                <div class="stat-chip"><span class="chip-label">Week</span><span class="chip-value" id="tbWeek">1</span></div>
                <div class="stat-chip"><span class="chip-label">Season</span><span class="chip-value" id="tbSeason">25/26</span></div>
                <div class="stat-chip"><span class="chip-label">Balance</span><span class="chip-value" id="tbBalance">€0</span></div>
                <div class="stat-chip"><span class="chip-label">Reputation</span><span class="chip-value" id="tbRep">0</span></div>
                <button class="btn-primary" id="advanceBtn">Advance week ▶</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <nav class="nav">
                    <a href="#" class="nav-item active" data-view="dashboard">📊 Dashboard</a>
                    <a href="#" class="nav-item" data-view="clients">👤 My clients</a>
                    <a href="#" class="nav-item" data-view="talent">🌱 Talent</a>
                    <a href="#" class="nav-item" data-view="scouts">🕵️ Scouts</a>
                    <a href="#" class="nav-item" data-view="agency">🏢 Agency</a>
                    <a href="#" class="nav-item" data-view="inbox">📨 Inbox <span class="nav-badge" id="inboxBadge" style="display:none">0</span></a>
                    <a href="#" class="nav-item" data-view="leagues">🏆 Leagues</a>
                </nav>
                <button class="btn-ghost reset-btn" id="resetBtn">Reset game</button>
            </aside>

            <section class="content">
                <div id="dashboardView" class="view active"></div>
                <div id="clientsView" class="view"></div>
                <div id="talentView" class="view"></div>
                <div id="scoutsView" class="view"></div>
                <div id="agencyView" class="view"></div>
                <div id="inboxView" class="view"></div>
                <div id="leaguesView" class="view"></div>
            </section>
        </div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="modal-close" id="modalClose">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="js/names-data.js"></script>
    <script src="js/clubs.js"></script>
    <script src="js/players.js"></script>
    <script src="js/game-state.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/scouting.js"></script>
    <script src="js/league.js"></script>
    <script src="js/scouts.js"></script>
    <script src="js/agency.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
